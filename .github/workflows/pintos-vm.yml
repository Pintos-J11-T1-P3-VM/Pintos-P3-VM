name: Pintos VM CI

on:
  pull_request:
    branches: [develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential qemu-system-x86

      - name: Build VM
        run: |
          cd pintos/vm
          export PATH="$GITHUB_WORKSPACE/pintos/utils:$PATH"
          make clean || true
          make

      - name: Run VM tests
        id: run_tests
        run: |
          cd pintos/vm
          export PATH="$GITHUB_WORKSPACE/pintos/utils:$PATH"
          # run tests and save summary
          make check | tee /tmp/test.log
          # naive parse: count "[ OK ]" as pass and "[ FAIL ]" as total markers
          passed=$(grep -c "\[ OK \]" /tmp/test.log || true)
          total=$(grep -E "\[ OK \]|\[ FAIL \]" /tmp/test.log | wc -l || true)
          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = '${{ steps.run_tests.outputs.passed }}';
            const total = '${{ steps.run_tests.outputs.total }}';
            const body = `VM tests: ${passed}/${total} passed (see workflow logs for details).`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
